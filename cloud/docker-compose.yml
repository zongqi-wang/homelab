networks:
  default:
    name: homelab_net
    external: true

services:
  nextcloud:
    image: nextcloud:apache
    container_name: nextcloud
    labels:
      kuma.nextcloud.docker.name: nextcloud
    ports:
      - "8086:80"
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_HOST=nextcloud-db
    volumes:
      - /mnt/user/appdata/nextcloud:/var/www/html
      - /mnt/user/data/nextcloud:/var/www/html/data
      - /mnt/user/data/documents:/mnt/paperless_docs
    depends_on:
      - nextcloud-db
    restart: unless-stopped

  nextcloud-db:
    image: mariadb:10.6
    container_name: nextcloud-db
    labels:
      kuma.nextcloud-db.docker.name: nextcloud-db
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
    volumes:
      - /mnt/user/appdata/nextcloud-db:/var/lib/mysql
    restart: unless-stopped

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    labels:
      kuma.paperless.docker.name: paperless
    ports:
      - "8000:8000"
    depends_on:
      - paperless-db
      - paperless-redis
      - gotenberg
      - tika
    environment:
      - USERMAP_UID=1000
      - USERMAP_GID=1000
      - PAPERLESS_REDIS=redis://paperless-redis:6379
      - PAPERLESS_DBHOST=paperless-db
      - PAPERLESS_DBNAME=paperless
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_DBPASS=${POSTGRES_PASSWORD}
      - PAPERLESS_TIKA_ENABLED=1
      - PAPERLESS_TIKA_GOTENBERG_ENDPOINT=http://gotenberg:3000
      - PAPERLESS_TIKA_ENDPOINT=http://tika:9998
      - PAPERLESS_URL=http://${LAN_HOST}:8000
      - PAPERLESS_ADMIN_USER=${PAPERLESS_ADMIN_USER}
      - PAPERLESS_ADMIN_PASSWORD=${PAPERLESS_ADMIN_PASSWORD}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY}
      - PAPERLESS_CONSUMER_RECURSIVE=true
      - PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS=true
    volumes:
      - /mnt/user/data/documents:/usr/src/paperless/data
      - /mnt/user/data/documents/consume:/usr/src/paperless/consume
      - /mnt/user/data/nextcloud/admin/files/Documents:/usr/src/paperless/consume_nextcloud
      - /mnt/user/data/documents/export:/usr/src/paperless/export
      - /mnt/user/appdata/paperless:/usr/src/paperless/media
    restart: unless-stopped
  paperless-db:
    image: postgres:15
    container_name: paperless-db
    labels:
      kuma.paperless-db.docker.name: paperless-db
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - /mnt/user/appdata/paperless-db:/var/lib/postgresql/data
    restart: unless-stopped

  paperless-redis:
    image: redis:7
    container_name: paperless-redis
    labels:
      kuma.paperless-redis.docker.name: paperless-redis
    volumes:
      - /mnt/user/appdata/paperless-redis:/data
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: gotenberg
    labels:
      kuma.gotenberg.docker.name: gotenberg
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    restart: unless-stopped

  tika:
    image: apache/tika:latest
    container_name: tika
    labels:
      kuma.tika.docker.name: tika
    restart: unless-stopped

  immich-server:
    container_name: immich_server
    labels:
      kuma.immich_server.docker.name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    mem_limit: 4g
    depends_on:
      - immich-redis
      - immich-postgres
    ports:
      - "2283:2283"
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich_postgres
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE_NAME=${DB_DATABASE_NAME}
      - REDIS_HOSTNAME=immich_redis
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    labels:
      kuma.immich_machine_learning.docker.name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - /mnt/user/appdata/immich/model-cache:/cache
    restart: always
    healthcheck:
      disable: false

  immich-redis:
    container_name: immich_redis
    labels:
      kuma.immich_redis.docker.name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  immich-postgres:
    container_name: immich_postgres
    labels:
      kuma.immich_postgres.docker.name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - /mnt/user/appdata/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    labels:
      kuma.gitea.docker.name: gitea
    environment:
      - USER_UID=99
      - USER_GID=100
      - GITEA__server__DOMAIN=${LAN_HOST}
      - GITEA__server__SSH_PORT=2424
      - GITEA__server__HTTP_PORT=8929
      - GITEA__server__ROOT_URL=http://${LAN_HOST}:8929/
      - GITEA__actions__ENABLED=true
      - GITEA__service__REQUIRE_SIGNIN_VIEW=true
      - GITEA__service__DEFAULT_USER_IS_RESTRICTED=true
    ports:
      - "8929:8929"
      - "2424:22"
    volumes:
      - /mnt/user/appdata/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  act-runner:
    image: gitea/act_runner:latest
    container_name: act-runner
    labels:
      kuma.act-runner.docker.name: act-runner
    depends_on:
      - gitea
    environment:
      - GITEA_INSTANCE_URL=http://${LAN_HOST}:8929
      - GITEA_RUNNER_REGISTRATION_TOKEN=
    volumes:
      - /mnt/user/appdata/act-runner:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

networks:
  default:
    name: homelab_net
    external: true

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    labels:
      kuma.gluetun.docker.name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - VPN_ENDPOINT_IP=${VPN_ENDPOINT_IP}
      - VPN_ENDPOINT_PORT=${VPN_ENDPOINT_PORT}
      - DNS_ADDRESS=${DNS_ADDRESS}
      - VPN_PORT_FORWARDING=${VPN_PORT_FORWARDING}
      - VPN_PORT_FORWARDING_PROVIDER=${VPN_PORT_FORWARDING_PROVIDER}
      - FIREWALL_INPUT_PORTS=8080
      - FIREWALL_OUTBOUND_SUBNETS=172.16.0.0/12,${LAN_SUBNET}
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
    ports:
      - "8080:8080"
      - "8001:8000"
    volumes:
      - /mnt/user/appdata/gluetun:/gluetun
    restart: unless-stopped

  qbittorrent-port-updater:
    image: alpine:latest
    container_name: qbittorrent-port-updater
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
      - qbittorrent
    environment:
      - QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD}
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl jq
        PREV_PORT=0
        while true; do
          PORT=$(curl -sf http://localhost:8000/v1/portforwarded | jq -r '.port // 0')
          if [ -n "$$PORT" ] && [ "$$PORT" != "0" ] && [ "$$PORT" != "$$PREV_PORT" ]; then
            curl -sf -c /tmp/qbt.jar -X POST http://localhost:8080/api/v2/auth/login \
              -d "username=admin&password=$$QBITTORRENT_PASSWORD" > /dev/null
            curl -sf -b /tmp/qbt.jar -X POST http://localhost:8080/api/v2/app/setPreferences \
              -d "json={\"listen_port\":$$PORT,\"random_port\":false}" > /dev/null
            echo "[port-updater] qBittorrent listen port updated to $$PORT"
            PREV_PORT=$$PORT
          fi
          sleep 30
        done
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    labels:
      kuma.qbittorrent.docker.name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
      - WEBUI_PORT=8080
    volumes:
      - /mnt/user/appdata/qbittorrent:/config
      - /mnt/user/data:/data
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    labels:
      kuma.sabnzbd.docker.name: sabnzbd
    ports:
      - "8085:8080"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - /mnt/user/appdata/sabnzbd:/config
      - /mnt/user/data:/data
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    labels:
      kuma.flaresolverr.docker.name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${TZ}
    ports:
      - "8191:8191"
    restart: unless-stopped

  makemkv:
    image: jlesage/makemkv
    container_name: makemkv
    labels:
      kuma.makemkv.docker.name: makemkv
    ports:
      - "5800:5800"
    environment:
      - USER_ID=${PUID}
      - GROUP_ID=${PGID}
      - TZ=${TZ}
      - KEEP_APP_RUNNING=1
      - ENABLE_CJK_FONT=1
    volumes:
      - /mnt/user/appdata/makemkv:/config:rw
      - /mnt/user/data/media/tv:/storage:rw
    restart: unless-stopped


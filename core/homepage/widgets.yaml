- datetime:
    text_size: xl
    format:
      dateStyle: short
      timeStyle: short

- openmeteo:
    label: "{{HOMEPAGE_VAR_WEATHER_LABEL}}"
    latitude: "{{HOMEPAGE_VAR_WEATHER_LAT}}"
    longitude: "{{HOMEPAGE_VAR_WEATHER_LON}}"
    timezone: "{{HOMEPAGE_VAR_WEATHER_TZ}}"
    units: "{{HOMEPAGE_VAR_WEATHER_UNITS}}"
    cache: 10

- resources:
    cpu: true
    memory: true
    label: Unraid
- resources:
    disk: /data
    label: Array (Data Share)
- resources:
    disk: /mnt/cache
    label: Cache Drive

- search:
    provider: duckduckgo
    target: _blank

- iframe:
    src: http://{{HOMEPAGE_VAR_LAN_HOST}}:3005/d/host-overview-iac/host-overview?orgId=1&kiosk=tv&refresh=30s
    classes: h-96 w-full

- iframe:
    src: http://{{HOMEPAGE_VAR_LAN_HOST}}:3005/d/container-overview-iac/container-overview?orgId=1&kiosk=tv&refresh=30s
    classes: h-96 w-full
